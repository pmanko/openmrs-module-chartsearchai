name: Build Docker Images

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'CLAUDE.md'
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE: openmrs/openmrs-reference-application-3
  DOCKER_IMAGE_TAG: 'nightly-chartsearch'
  DOCKER_IMAGE_PLATFORMS: linux/amd64,linux/arm64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish-frontend:
    name: Build and Publish the Frontend Image
    if: github.repository_owner == 'openmrs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: Dockerfile.frontend
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          build-args: |
            CACHE_BUST=${{ github.run_id }}
          tags: |
            ${{ env.IMAGE }}-frontend:${{ env.DOCKER_IMAGE_TAG }}

  build-and-publish-backend:
    name: Build and Publish the Backend Image
    if: github.repository_owner == 'openmrs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: Dockerfile.backend
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          build-args: |
            MVN_COMMAND=deploy
            CACHE_BUST=${{ github.run_id }}
          secret-files: |
            m2settings=/tmp/maven-settings.xml
          tags: |
            ${{ env.IMAGE }}-backend:${{ env.DOCKER_IMAGE_TAG }}

  build-and-publish-gateway:
    name: Build and Publish the Gateway Image
    if: github.repository_owner == 'openmrs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: Dockerfile.gateway
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          tags: |
            ${{ env.IMAGE }}-gateway:${{ env.DOCKER_IMAGE_TAG }}
