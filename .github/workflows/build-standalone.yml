name: Build O3 Standalone with Chart Search AI

on:
  # Rebuild on every push so the README's nightly.link download stays current:
  # nightly.link only serves artifacts from push/schedule-triggered runs, so
  # workflow_dispatch rebuilds are invisible to the download button.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refapp_version:
        description: 'O3 Reference Application version'
        required: false
        default: '3.7.0-SNAPSHOT'
        type: string
      openmrs_version:
        description: 'OpenMRS Core version'
        required: false
        default: '2.9.0-SNAPSHOT'
        type: string
      standalone_branch:
        description: 'openmrs-standalone branch to build from'
        required: false
        default: 'openmrs-emr3'
        type: string
      gguf_model_url:
        description: 'Download URL for the GGUF model file'
        required: false
        default: 'https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q4_K_M.gguf'
        type: string
      onnx_model_url:
        description: 'Download URL for the ONNX model file'
        required: false
        default: ''   # MiniLM is only used by the non-default chartsearchai.embedding.preFilter pipeline; not bundled
        type: string
      vocab_url:
        description: 'Download URL for the vocab.txt file'
        required: false
        default: ''
        type: string

concurrency:
  group: build-standalone
  cancel-in-progress: true

env:
  REFAPP_VERSION: ${{ inputs.refapp_version || '3.7.0-SNAPSHOT' }}
  OPENMRS_VERSION: ${{ inputs.openmrs_version || '2.9.0-SNAPSHOT' }}
  STANDALONE_BRANCH: ${{ inputs.standalone_branch || 'openmrs-emr3' }}
  GGUF_MODEL_URL: ${{ inputs.gguf_model_url || 'https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q4_K_M.gguf' }}
  ONNX_MODEL_URL: ${{ inputs.onnx_model_url || '' }}
  VOCAB_URL: ${{ inputs.vocab_url || '' }}

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout chartsearchai backend module
        uses: actions/checkout@v4
        with:
          path: chartsearchai-backend

      - name: Checkout chartsearchai frontend module
        uses: actions/checkout@v4
        with:
          repository: openmrs/openmrs-esm-chartsearchai
          path: chartsearchai-frontend

      - name: Checkout openmrs-standalone
        uses: actions/checkout@v4
        with:
          repository: openmrs/openmrs-standalone
          ref: ${{ env.STANDALONE_BRANCH }}
          path: standalone

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn 4.x)
        run: corepack enable

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      # Build and install the chartsearchai omod into the local Maven repo
      - name: Build chartsearchai backend module
        working-directory: chartsearchai-backend
        run: |
          mvn clean install -B -DskipTests \
            --settings ../standalone/.github/maven-settings.xml

      # Build the chartsearchai frontend ESM
      - name: Build chartsearchai frontend module
        working-directory: chartsearchai-frontend
        run: |
          yarn install
          yarn build

      # Download AI model files if URLs are provided
      - name: Download AI model files
        run: |
          mkdir -p standalone/target/chartsearchai

          if [ -n "$GGUF_MODEL_URL" ]; then
            echo "Downloading GGUF model..."
            curl -L -o "standalone/target/chartsearchai/$(basename "$GGUF_MODEL_URL")" \
              "$GGUF_MODEL_URL"
          fi

          if [ -n "$ONNX_MODEL_URL" ]; then
            echo "Downloading ONNX model..."
            curl -L -o standalone/target/chartsearchai/model.onnx \
              "$ONNX_MODEL_URL"
          fi

          if [ -n "$VOCAB_URL" ]; then
            echo "Downloading vocab file..."
            curl -L -o standalone/target/chartsearchai/vocab.txt \
              "$VOCAB_URL"
          fi

          # querystore embedding model: e5-base-v2 (ADR Decision 22). The Xenova mirror ships a
          # self-contained ONNX export; the canonical intfloat onnx/ uses external-data format
          # that breaks as a single-file download.
          mkdir -p standalone/target/querystore
          echo "Downloading querystore e5-base-v2 embedding model..."
          curl -L -o standalone/target/querystore/e5_model.onnx \
            "https://huggingface.co/Xenova/e5-base-v2/resolve/main/onnx/model.onnx"
          curl -L -o standalone/target/querystore/vocab.txt \
            "https://huggingface.co/intfloat/e5-base-v2/resolve/main/vocab.txt"

          echo "AI model files:"
          ls -lh standalone/target/chartsearchai/ standalone/target/querystore/ || echo "No model files downloaded"

      # Patch the standalone build to include chartsearchai
      - name: Configure standalone build for chartsearchai
        working-directory: standalone
        run: |
          # 1. Update OpenMRS Core and RefApp versions in pom.xml
          sed -i "s|<openmrs.version>.*</openmrs.version>|<openmrs.version>${OPENMRS_VERSION}</openmrs.version>|" pom.xml
          sed -i "s|<refapp.version>.*</refapp.version>|<refapp.version>${REFAPP_VERSION}</refapp.version>|" pom.xml

          # 2. Add chartsearchai omod to the distro properties via pom-step-01.xml
          #    Insert an echo task after the existing replaceregexp tasks
          sed -i '/<\/target>/i \
                                  <echo file="${project.build.directory}/openmrs3x/openmrs-distro.properties"\
                                        append="true" message="${line.separator}omod.chartsearchai=1.0.0-SNAPSHOT${line.separator}omod.querystore=1.0.0-SNAPSHOT${line.separator}"/>' pom-step-01.xml

          # 3. Add chartsearchai model files to the assembly descriptor (if models were downloaded)
          if [ -d "target/chartsearchai" ] && [ "$(ls -A target/chartsearchai 2>/dev/null)" ]; then
            sed -i '/<\/fileSets>/i \
              <fileSet>\
                <directory>${project.build.directory}/chartsearchai</directory>\
                <outputDirectory>${project.build.finalName}/appdata/chartsearchai</outputDirectory>\
              </fileSet>' src/main/assembly/zip-standalone.xml
          fi

          # 4. Add the querystore embedding model to the assembly descriptor
          if [ -d "target/querystore" ] && [ "$(ls -A target/querystore 2>/dev/null)" ]; then
            sed -i '/<\/fileSets>/i \
              <fileSet>\
                <directory>${project.build.directory}/querystore</directory>\
                <outputDirectory>${project.build.finalName}/appdata/querystore</outputDirectory>\
              </fileSet>' src/main/assembly/zip-standalone.xml
          fi

          # 5. Pre-enable the querystore retrieval path in the bundled demo database.
          #    Modules only create global properties that are missing, so rows present in the
          #    imported demo dump win over the module defaults on first start.
          {
            echo ""
            echo "INSERT INTO global_property (property, property_value, uuid) VALUES"
            echo "('chartsearchai.querystore.enabled','true',UUID()),"
            echo "('querystore.backend','lucene',UUID()),"
            echo "('querystore.embedding.modelFilePath','querystore/e5_model.onnx',UUID()),"
            echo "('querystore.embedding.vocabFilePath','querystore/vocab.txt',UUID());"
          } >> "src/main/db/demo-db-${REFAPP_VERSION}.sql"

      - name: Pre-run OpenMRS SDK Plugin
        working-directory: standalone
        run: mvn org.openmrs.maven.plugins:openmrs-sdk-maven-plugin:setup-sdk -B --settings .github/maven-settings.xml

      # Workaround for upstream openmrs@9.0.3-pre.4342 transitive-dep regression:
      # The SDK invokes `npm exec -- openmrs@9.0.3-pre.4342 build` from standalone/.
      # When npx installs the CLI fresh, the resulting tree is missing both
      # @react-aria/utils (imported by @openmrs/esm-styleguide/dist/datepicker)
      # AND the deps that ModuleFederation shares (react, react-dom, etc.):
      # rspack walks up from @openmrs/esm-app-shell/rspack.config.js to find
      # them, but they aren't hoisted into the npx tree.
      #
      # Pre-installing the CLI locally fixes both at once: `npm exec` detects a
      # matching local copy at standalone/node_modules/openmrs/ and uses it
      # instead of npx-installing fresh, so resolution walks up through
      # standalone/node_modules/ where npm hoists every transitive dep
      # correctly. Adding @react-aria/utils as a sibling fills the
      # styleguide's missing import.
      #
      # Trivially revertible once @openmrs/esm-styleguide republishes with
      # @react-aria/utils as a real dep AND openmrs CLI's published tree
      # carries its declared deps end-to-end.
      - name: Pre-install openmrs CLI + @react-aria/utils alongside standalone
        working-directory: standalone
        run: |
          cat > package.json <<'EOF'
          {
            "name": "openmrs-standalone-spa-deps",
            "private": true,
            "dependencies": {
              "openmrs": "9.0.3-pre.4342",
              "@react-aria/utils": "*"
            }
          }
          EOF
          npm install --legacy-peer-deps
          [ -d node_modules/openmrs ] || { echo "openmrs CLI not installed locally"; exit 1; }
          [ -d node_modules/react ] || { echo "react not installed (MFE fallback would fail)"; exit 1; }
          [ -d node_modules/react-dom ] || { echo "react-dom not installed (MFE fallback would fail)"; exit 1; }
          [ -d node_modules/@react-aria/utils ] || { echo "@react-aria/utils not installed"; exit 1; }
          INSTALLED_VER=$(node -p "require('./node_modules/openmrs/package.json').version")
          [ "$INSTALLED_VER" = "9.0.3-pre.4342" ] || { echo "openmrs version mismatch: got $INSTALLED_VER"; exit 1; }

      # Build the standalone distribution (skip Docker init in CI)
      - name: Build standalone distribution
        working-directory: standalone
        run: |
          mvn package -Pci -B \
            --settings .github/maven-settings.xml \
            -Drefapp.version=$REFAPP_VERSION \
            -Dopenmrs.version=$OPENMRS_VERSION

      # Integrate the chartsearchai ESM into the assembled frontend
      - name: Integrate chartsearchai frontend module
        working-directory: standalone
        run: |
          FRONTEND_DIR="target/distro/web/openmrs_spa"
          MODULE_NAME="openmrs-esm-chartsearchai-app"

          # Copy built ESM files
          mkdir -p "$FRONTEND_DIR/$MODULE_NAME"
          cp -r ../chartsearchai-frontend/dist/* "$FRONTEND_DIR/$MODULE_NAME/"

          # Update importmap.json
          if [ -f "$FRONTEND_DIR/importmap.json" ]; then
            jq --arg key "@openmrs/esm-chartsearchai-app" \
               --arg val "./$MODULE_NAME/$MODULE_NAME.js" \
               '.imports[$key] = $val' \
               "$FRONTEND_DIR/importmap.json" > "$FRONTEND_DIR/importmap.json.tmp"
            mv "$FRONTEND_DIR/importmap.json.tmp" "$FRONTEND_DIR/importmap.json"
          fi

          # Update routes.registry.json
          ROUTES_JSON="$FRONTEND_DIR/$MODULE_NAME/routes.json"
          if [ -f "$FRONTEND_DIR/routes.registry.json" ] && [ -f "$ROUTES_JSON" ]; then
            jq --slurpfile routes "$ROUTES_JSON" \
               '.["@openmrs/esm-chartsearchai-app"] = $routes[0]' \
               "$FRONTEND_DIR/routes.registry.json" > "$FRONTEND_DIR/routes.registry.json.tmp"
            mv "$FRONTEND_DIR/routes.registry.json.tmp" "$FRONTEND_DIR/routes.registry.json"
          fi

      # Re-run just the assembly phase to produce the final zip with the ESM included
      - name: Assemble final standalone zip
        working-directory: standalone
        run: |
          mvn package -rf :referenceapplication-standalone-zip-stage -Dexec.skip=true -B \
            --settings .github/maven-settings.xml \
            -Drefapp.version=$REFAPP_VERSION \
            -Dopenmrs.version=$OPENMRS_VERSION

      - name: Verify chartsearchai components in zip
        working-directory: standalone
        run: |
          ZIP_FILE="target/referenceapplication-standalone-${REFAPP_VERSION}.zip"
          echo "=== Standalone zip ==="
          ls -lh "$ZIP_FILE"

          echo ""
          echo "=== Chartsearchai components ==="
          zipinfo -1 "$ZIP_FILE" | grep -i chartsearch || echo "WARNING: No chartsearchai files found"

          echo ""
          echo "=== Importmap entry ==="
          unzip -p "$ZIP_FILE" "*/frontend/importmap.json" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(d['imports'].get('@openmrs/esm-chartsearchai-app', 'NOT FOUND'))"

          echo ""
          echo "=== Routes registry entry ==="
          unzip -p "$ZIP_FILE" "*/frontend/routes.registry.json" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print('@openmrs/esm-chartsearchai-app' in d)"

          echo ""
          echo "=== Querystore components ==="
          zipinfo -1 "$ZIP_FILE" | grep -i querystore || { echo "ERROR: no querystore files in zip"; exit 1; }

          echo ""
          echo "=== Querystore GPs in bundled demo DB ==="
          unzip -p "$ZIP_FILE" "*/demodatabase.zip" > /tmp/demodb.zip
          GP_COUNT=$(unzip -p /tmp/demodb.zip "data/demo-db-${REFAPP_VERSION}.sql" | grep -c "querystore" || true)
          echo "querystore mentions in demo dump: $GP_COUNT"
          [ "$GP_COUNT" -ge 4 ] || { echo "ERROR: querystore GPs missing from bundled demo DB"; exit 1; }

          echo ""
          echo "=== Windows MSVC runtime DLLs (so ONNX loads without the VC++ Redistributable) ==="
          zipinfo -1 "$ZIP_FILE" | grep -iE "native/windows-x64/lib/.*\.dll" || echo "(none listed)"
          DLL_COUNT=$(zipinfo -1 "$ZIP_FILE" | grep -ciE "native/windows-x64/lib/(vcruntime140|vcruntime140_1|msvcp140)\.dll" || true)
          echo "bundled Windows MSVC runtime DLLs in zip: $DLL_COUNT"
          [ "$DLL_COUNT" -ge 3 ] || { echo "ERROR: Windows MSVC runtime DLLs missing from zip (chart search would fail on Windows without the VC++ Redistributable)"; exit 1; }

      # GitHub always re-zips whatever upload-artifact is handed. Uploading the
      # standalone .zip directly therefore yields a zip-inside-a-zip that users
      # must extract twice. Extract it here and upload the *contents* so GitHub's
      # mandatory wrapper IS the standalone zip — one extraction lands the
      # runnable directory.
      - name: Stage extracted standalone for a single-extract artifact
        working-directory: standalone/target
        run: |
          ZIP="referenceapplication-standalone-${REFAPP_VERSION}.zip"
          # Reclaim space before doubling the standalone on disk (the verify step
          # already ran against the zip, and nothing downstream needs these).
          rm -rf ~/.m2/repository "$GITHUB_WORKSPACE"/standalone/node_modules || true
          rm -rf chartsearchai querystore || true
          unzip -q "$ZIP" -d artifact
          rm -f "$ZIP"
          echo "Artifact tree (extracts in one step):"
          ls -1 artifact

      - name: Upload standalone as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmrs-standalone-chartsearchai
          path: standalone/target/artifact
          # The old upload handed over the .zip as an opaque blob, so every byte
          # (including dotfiles) survived. Re-uploading the extracted tree subjects
          # it to v4's default hidden-file exclusion — keep parity so no runtime
          # config or appdata marker is silently dropped.
          include-hidden-files: true
          retention-days: 90
