name: Build O3 Standalone with Chart Search AI

on:
  # Rebuild on every push so the README's nightly.link download stays current:
  # nightly.link only serves artifacts from push/schedule-triggered runs, so
  # workflow_dispatch rebuilds are invisible to the download button.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refapp_version:
        description: 'O3 Reference Application version'
        required: false
        default: '3.7.0-SNAPSHOT'
        type: string
      openmrs_version:
        description: 'OpenMRS Core version'
        required: false
        default: '2.9.0-SNAPSHOT'
        type: string
      standalone_branch:
        description: 'openmrs-standalone branch to build from'
        required: false
        default: 'openmrs-emr3'
        type: string
      gguf_model_url:
        description: 'Download URL for the GGUF model file'
        required: false
        default: 'https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q4_K_M.gguf'
        type: string
      onnx_model_url:
        description: 'Download URL for the ONNX model file'
        required: false
        default: ''   # MiniLM is only used by the non-default chartsearchai.embedding.preFilter pipeline; not bundled
        type: string
      vocab_url:
        description: 'Download URL for the vocab.txt file'
        required: false
        default: ''
        type: string

concurrency:
  group: build-standalone
  cancel-in-progress: true

env:
  REFAPP_VERSION: ${{ inputs.refapp_version || '3.7.0-SNAPSHOT' }}
  OPENMRS_VERSION: ${{ inputs.openmrs_version || '2.9.0-SNAPSHOT' }}
  STANDALONE_BRANCH: ${{ inputs.standalone_branch || 'openmrs-emr3' }}
  GGUF_MODEL_URL: ${{ inputs.gguf_model_url || 'https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q4_K_M.gguf' }}
  ONNX_MODEL_URL: ${{ inputs.onnx_model_url || '' }}
  VOCAB_URL: ${{ inputs.vocab_url || '' }}

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    # Raised from 120 to absorb the querystore index-bake step (full headless O3 boot +
    # reindex). The bake's own internal poll ceilings (~33m readiness + ~30m indexing) sit
    # under this so the step's diagnostic fail() — with a 250-line log tail — fires on a real
    # hang, instead of an opaque job-level timeout kill.
    timeout-minutes: 150

    steps:
      # Reclaim ~20GB of preinstalled toolchains we never use (Android SDK, .NET, Haskell,
      # Swift, etc.). The standalone zip-assembly step holds the ~5GB GGUF + war + SPA + ~/.m2
      # + node_modules + the output zip resident at once and was exhausting the runner disk
      # ("No space left on device"); freeing these up front unblocks assembly and leaves the
      # index-bake step room to copy + boot. Leaves /opt/hostedtoolcache (the JDK/Node this
      # job actually uses) untouched.
      - name: Free up runner disk space
        run: |
          echo "Disk before reclaim:"; df -h / | tail -1
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/lib/node_modules 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo "Disk after reclaim:"; df -h / | tail -1

      - name: Checkout chartsearchai backend module
        uses: actions/checkout@v4
        with:
          path: chartsearchai-backend

      - name: Checkout chartsearchai frontend module
        uses: actions/checkout@v4
        with:
          repository: openmrs/openmrs-esm-chartsearchai
          path: chartsearchai-frontend

      - name: Checkout openmrs-standalone
        uses: actions/checkout@v4
        with:
          repository: openmrs/openmrs-standalone
          ref: ${{ env.STANDALONE_BRANCH }}
          path: standalone

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn 4.x)
        run: corepack enable

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      # Build and install the chartsearchai omod into the local Maven repo
      - name: Build chartsearchai backend module
        working-directory: chartsearchai-backend
        run: |
          mvn clean install -B -DskipTests \
            --settings ../standalone/.github/maven-settings.xml

      # Build the chartsearchai frontend ESM
      - name: Build chartsearchai frontend module
        working-directory: chartsearchai-frontend
        run: |
          yarn install
          yarn build

      # Download AI model files if URLs are provided
      - name: Download AI model files
        run: |
          mkdir -p standalone/target/chartsearchai

          if [ -n "$GGUF_MODEL_URL" ]; then
            echo "Downloading GGUF model..."
            curl -L -o "standalone/target/chartsearchai/$(basename "$GGUF_MODEL_URL")" \
              "$GGUF_MODEL_URL"
          fi

          if [ -n "$ONNX_MODEL_URL" ]; then
            echo "Downloading ONNX model..."
            curl -L -o standalone/target/chartsearchai/model.onnx \
              "$ONNX_MODEL_URL"
          fi

          if [ -n "$VOCAB_URL" ]; then
            echo "Downloading vocab file..."
            curl -L -o standalone/target/chartsearchai/vocab.txt \
              "$VOCAB_URL"
          fi

          # querystore embedding model: e5-base-v2 (ADR Decision 22). The Xenova mirror ships a
          # self-contained ONNX export; the canonical intfloat onnx/ uses external-data format
          # that breaks as a single-file download.
          mkdir -p standalone/target/querystore
          echo "Downloading querystore e5-base-v2 embedding model..."
          curl -L -o standalone/target/querystore/e5_model.onnx \
            "https://huggingface.co/Xenova/e5-base-v2/resolve/main/onnx/model.onnx"
          curl -L -o standalone/target/querystore/vocab.txt \
            "https://huggingface.co/intfloat/e5-base-v2/resolve/main/vocab.txt"

          echo "AI model files:"
          ls -lh standalone/target/chartsearchai/ standalone/target/querystore/ || echo "No model files downloaded"

      # Patch the standalone build to include chartsearchai
      - name: Configure standalone build for chartsearchai
        working-directory: standalone
        run: |
          # 1. Update OpenMRS Core and RefApp versions in pom.xml
          sed -i "s|<openmrs.version>.*</openmrs.version>|<openmrs.version>${OPENMRS_VERSION}</openmrs.version>|" pom.xml
          sed -i "s|<refapp.version>.*</refapp.version>|<refapp.version>${REFAPP_VERSION}</refapp.version>|" pom.xml

          # 2. Add chartsearchai omod to the distro properties via pom-step-01.xml
          #    Insert an echo task after the existing replaceregexp tasks
          sed -i '/<\/target>/i \
                                  <echo file="${project.build.directory}/openmrs3x/openmrs-distro.properties"\
                                        append="true" message="${line.separator}omod.chartsearchai=1.0.0-SNAPSHOT${line.separator}omod.querystore=1.0.0-SNAPSHOT${line.separator}"/>' pom-step-01.xml

          # 3. Add chartsearchai model files to the assembly descriptor (if models were downloaded)
          if [ -d "target/chartsearchai" ] && [ "$(ls -A target/chartsearchai 2>/dev/null)" ]; then
            sed -i '/<\/fileSets>/i \
              <fileSet>\
                <directory>${project.build.directory}/chartsearchai</directory>\
                <outputDirectory>${project.build.finalName}/appdata/chartsearchai</outputDirectory>\
              </fileSet>' src/main/assembly/zip-standalone.xml
          fi

          # 4. Add the querystore embedding model to the assembly descriptor
          if [ -d "target/querystore" ] && [ "$(ls -A target/querystore 2>/dev/null)" ]; then
            sed -i '/<\/fileSets>/i \
              <fileSet>\
                <directory>${project.build.directory}/querystore</directory>\
                <outputDirectory>${project.build.finalName}/appdata/querystore</outputDirectory>\
              </fileSet>' src/main/assembly/zip-standalone.xml
          fi

          # 5. Pre-enable the querystore retrieval path in the bundled demo database.
          #    Modules only create global properties that are missing, so rows present in the
          #    imported demo dump win over the module defaults on first start.
          {
            echo ""
            echo "INSERT INTO global_property (property, property_value, uuid) VALUES"
            echo "('chartsearchai.querystore.enabled','true',UUID()),"
            echo "('querystore.backend','lucene',UUID()),"
            echo "('querystore.embedding.modelFilePath','querystore/e5_model.onnx',UUID()),"
            echo "('querystore.embedding.vocabFilePath','querystore/vocab.txt',UUID());"
          } >> "src/main/db/demo-db-${REFAPP_VERSION}.sql"

      - name: Pre-run OpenMRS SDK Plugin
        working-directory: standalone
        run: mvn org.openmrs.maven.plugins:openmrs-sdk-maven-plugin:setup-sdk -B --settings .github/maven-settings.xml

      # Workaround for upstream openmrs@9.0.3-pre.4342 transitive-dep regression:
      # The SDK invokes `npm exec -- openmrs@9.0.3-pre.4342 build` from standalone/.
      # When npx installs the CLI fresh, the resulting tree is missing both
      # @react-aria/utils (imported by @openmrs/esm-styleguide/dist/datepicker)
      # AND the deps that ModuleFederation shares (react, react-dom, etc.):
      # rspack walks up from @openmrs/esm-app-shell/rspack.config.js to find
      # them, but they aren't hoisted into the npx tree.
      #
      # Pre-installing the CLI locally fixes both at once: `npm exec` detects a
      # matching local copy at standalone/node_modules/openmrs/ and uses it
      # instead of npx-installing fresh, so resolution walks up through
      # standalone/node_modules/ where npm hoists every transitive dep
      # correctly. Adding @react-aria/utils as a sibling fills the
      # styleguide's missing import.
      #
      # Trivially revertible once @openmrs/esm-styleguide republishes with
      # @react-aria/utils as a real dep AND openmrs CLI's published tree
      # carries its declared deps end-to-end.
      - name: Pre-install openmrs CLI + @react-aria/utils alongside standalone
        working-directory: standalone
        run: |
          cat > package.json <<'EOF'
          {
            "name": "openmrs-standalone-spa-deps",
            "private": true,
            "dependencies": {
              "openmrs": "9.0.3-pre.4342",
              "@react-aria/utils": "*"
            }
          }
          EOF
          npm install --legacy-peer-deps
          [ -d node_modules/openmrs ] || { echo "openmrs CLI not installed locally"; exit 1; }
          [ -d node_modules/react ] || { echo "react not installed (MFE fallback would fail)"; exit 1; }
          [ -d node_modules/react-dom ] || { echo "react-dom not installed (MFE fallback would fail)"; exit 1; }
          [ -d node_modules/@react-aria/utils ] || { echo "@react-aria/utils not installed"; exit 1; }
          INSTALLED_VER=$(node -p "require('./node_modules/openmrs/package.json').version")
          [ "$INSTALLED_VER" = "9.0.3-pre.4342" ] || { echo "openmrs version mismatch: got $INSTALLED_VER"; exit 1; }

      # Build the standalone distribution (skip Docker init in CI). Tests are skipped here on
      # purpose: this job packages the distro, and the standalone's tests run in the
      # openmrs-standalone repo's own CI. Running them here also re-ran the timing-sensitive
      # MariaDbRestartTest on a loaded runner, which flakily timed out ("ready for connections"
      # not seen in 30s) and failed the whole download build.
      - name: Build standalone distribution
        working-directory: standalone
        run: |
          mvn package -Pci -B -DskipTests \
            --settings .github/maven-settings.xml \
            -Drefapp.version=$REFAPP_VERSION \
            -Dopenmrs.version=$OPENMRS_VERSION

      # Integrate the chartsearchai ESM into the assembled frontend
      - name: Integrate chartsearchai frontend module
        working-directory: standalone
        run: |
          FRONTEND_DIR="target/distro/web/openmrs_spa"
          MODULE_NAME="openmrs-esm-chartsearchai-app"

          # Copy built ESM files
          mkdir -p "$FRONTEND_DIR/$MODULE_NAME"
          cp -r ../chartsearchai-frontend/dist/* "$FRONTEND_DIR/$MODULE_NAME/"

          # Update importmap.json
          if [ -f "$FRONTEND_DIR/importmap.json" ]; then
            jq --arg key "@openmrs/esm-chartsearchai-app" \
               --arg val "./$MODULE_NAME/$MODULE_NAME.js" \
               '.imports[$key] = $val' \
               "$FRONTEND_DIR/importmap.json" > "$FRONTEND_DIR/importmap.json.tmp"
            mv "$FRONTEND_DIR/importmap.json.tmp" "$FRONTEND_DIR/importmap.json"
          fi

          # Update routes.registry.json
          ROUTES_JSON="$FRONTEND_DIR/$MODULE_NAME/routes.json"
          if [ -f "$FRONTEND_DIR/routes.registry.json" ] && [ -f "$ROUTES_JSON" ]; then
            jq --slurpfile routes "$ROUTES_JSON" \
               '.["@openmrs/esm-chartsearchai-app"] = $routes[0]' \
               "$FRONTEND_DIR/routes.registry.json" > "$FRONTEND_DIR/routes.registry.json.tmp"
            mv "$FRONTEND_DIR/routes.registry.json.tmp" "$FRONTEND_DIR/routes.registry.json"
          fi

      # Re-run just the assembly phase to produce the final zip with the ESM included
      - name: Assemble final standalone zip
        working-directory: standalone
        run: |
          mvn package -rf :referenceapplication-standalone-zip-stage -Dexec.skip=true -DskipTests -B \
            --settings .github/maven-settings.xml \
            -Drefapp.version=$REFAPP_VERSION \
            -Dopenmrs.version=$OPENMRS_VERSION

      - name: Verify chartsearchai components in zip
        working-directory: standalone
        run: |
          ZIP_FILE="target/referenceapplication-standalone-${REFAPP_VERSION}.zip"
          echo "=== Standalone zip ==="
          ls -lh "$ZIP_FILE"

          echo ""
          echo "=== Chartsearchai components ==="
          zipinfo -1 "$ZIP_FILE" | grep -i chartsearch || echo "WARNING: No chartsearchai files found"

          echo ""
          echo "=== Importmap entry ==="
          unzip -p "$ZIP_FILE" "*/frontend/importmap.json" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(d['imports'].get('@openmrs/esm-chartsearchai-app', 'NOT FOUND'))"

          echo ""
          echo "=== Routes registry entry ==="
          unzip -p "$ZIP_FILE" "*/frontend/routes.registry.json" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print('@openmrs/esm-chartsearchai-app' in d)"

          echo ""
          echo "=== Querystore components ==="
          zipinfo -1 "$ZIP_FILE" | grep -i querystore || { echo "ERROR: no querystore files in zip"; exit 1; }

          echo ""
          echo "=== Querystore GPs in bundled demo DB ==="
          unzip -p "$ZIP_FILE" "*/demodatabase.zip" > /tmp/demodb.zip
          GP_COUNT=$(unzip -p /tmp/demodb.zip "data/demo-db-${REFAPP_VERSION}.sql" | grep -c "querystore" || true)
          echo "querystore mentions in demo dump: $GP_COUNT"
          [ "$GP_COUNT" -ge 4 ] || { echo "ERROR: querystore GPs missing from bundled demo DB"; exit 1; }

      # GitHub always re-zips whatever upload-artifact is handed. Uploading the
      # standalone .zip directly therefore yields a zip-inside-a-zip that users
      # must extract twice. Extract it here and upload the *contents* so GitHub's
      # mandatory wrapper IS the standalone zip — one extraction lands the
      # runnable directory.
      - name: Stage extracted standalone for a single-extract artifact
        working-directory: standalone/target
        run: |
          ZIP="referenceapplication-standalone-${REFAPP_VERSION}.zip"
          # Reclaim space before doubling the standalone on disk (the verify step
          # already ran against the zip, and nothing downstream needs these).
          rm -rf ~/.m2/repository "$GITHUB_WORKSPACE"/standalone/node_modules || true
          rm -rf chartsearchai querystore || true
          unzip -q "$ZIP" -d artifact
          rm -f "$ZIP"
          echo "Artifact tree (extracts in one step):"
          ls -1 artifact

      # Bake the querystore Lucene index into the bundled appdata so the downloaded
      # standalone serves chart-search answers instantly on the first patient open,
      # instead of paying the cold per-patient embedding "indexing tax" the first time
      # each chart is touched.
      #
      # We do this in a THROWAWAY COPY of the just-assembled standalone (under /tmp),
      # never the artifact that gets uploaded: boot it headless against its bundled demo
      # database, trigger a full querystore reindex over REST, wait for completion, then
      # copy ONLY the generated appdata/querystore/lucene directory back into the pristine
      # artifact. The published tree is therefore byte-identical to a normal build plus
      # that one index directory — the user's first boot still imports the demo DB exactly
      # as before, and the pre-seeded index's patient UUIDs match that bundled dump. The
      # copy excludes the multi-GB *.gguf weights: indexing only needs the e5 embedder, and
      # leaving the LLM out keeps the bake run well under the runner's memory ceiling.
      #
      # Intentionally fatal: a published download must be pre-indexed, or the build fails.
      - name: Bake querystore Lucene index into the demo appdata
        working-directory: standalone/target/artifact
        run: |
          set -uo pipefail
          ART="referenceapplication-standalone-${REFAPP_VERSION}"
          [ -d "$ART" ] || { echo "::error::extracted standalone dir $ART not found"; ls -1; exit 1; }

          PRISTINE="$PWD/$ART"                          # uploaded artifact — only receives the index
          # IMPORTANT: the throwaway run dir must NOT live under the JVM temp dir (java.io.tmpdir,
          # which is /tmp on the Linux runner). MariaDB4j deletes its data dir on shutdown when that
          # dir sits under java.io.tmpdir, so a /tmp location would wipe the just-imported demo DB
          # during the intermediate stopMariaDB() — leaving the run phase with an empty schema
          # ("global_property doesn't exist") and the server stuck at HTTP 302. $GITHUB_WORKSPACE
          # (/home/runner/work/...) is not under /tmp, so the imported data dir survives. (Confirmed
          # by local repro: data dir under java.io.tmpdir -> wiped on stop; outside -> persists.)
          BAKE="$GITHUB_WORKSPACE/bakerun/$ART"          # throwaway run dir (NOT under /tmp — see above)
          BASE="http://127.0.0.1:8081/openmrs"          # tomcatport=8081, context=openmrs (shipped runtime props)
          AUTH="admin:Admin123"
          QS="$BASE/ws/rest/v1/querystore"

          # Throwaway copy WITHOUT the GGUF weights (indexing never loads the LLM).
          # Guard both: without `set -e`, a failed rsync (e.g. out of space) or cd would otherwise
          # let the script run on in the wrong directory and fail downstream with a misleading
          # "heap bump no-op" instead of a clear staging error.
          mkdir -p "$GITHUB_WORKSPACE/bakerun"
          rsync -a --exclude '*.gguf' "$PRISTINE/" "$BAKE/" \
            || { echo "::error::failed to stage throwaway standalone copy under $BAKE (disk space?)"; exit 1; }
          cd "$BAKE" || { echo "::error::could not cd into throwaway copy $BAKE"; exit 1; }
          # Give the boot enough heap for full O3 + the e5 embedder (shipped default is 512m).
          # Fail fast if the shipped vm_arguments string ever changes and this no-ops — otherwise
          # the boot silently runs at 512m and surfaces only as a cryptic readiness timeout below.
          sed -i 's/-Xmx512m -Xms512m/-Xmx3g -Xms1g/' openmrs-runtime.properties
          grep -q -- '-Xmx3g' openmrs-runtime.properties \
            || { echo "::error::heap bump no-op: shipped vm_arguments no longer matches '-Xmx512m -Xms512m'"; exit 1; }

          stop_server() {
            [ -f .standalone.pid ] && kill -TERM "$(cat .standalone.pid)" 2>/dev/null || true
            # Guard the var: `kill -TERM 0` would signal the whole process group (incl. this shell),
            # so never fall back to a literal 0 — only signal a real captured PID.
            [ -n "${BOOT_PID:-}" ] && kill -TERM "$BOOT_PID" 2>/dev/null || true
            pkill -f 'org.openmrs.standalone.ApplicationController' 2>/dev/null || true
            pkill -f 'mariadbd' 2>/dev/null || true
            pkill -f 'llama-server' 2>/dev/null || true
          }
          fail() {
            echo "::error::$1"
            echo "===== last 250 lines of standalone log ====="; tail -n 250 /tmp/standalone.log 2>/dev/null || true
            stop_server; exit 1
          }

          # --- boot the standalone headless (auto-imports the demo DB, no GUI) ---
          echo "Booting standalone (performs demo-DB import + module startup)..."
          nohup java -jar openmrs-standalone.jar -commandline -noninteractive > /tmp/standalone.log 2>&1 &
          BOOT_PID=$!

          # --- wait until the querystore REST surface answers (server fully started) ---
          echo "Waiting for OpenMRS + querystore to come up..."
          READY=0
          for i in $(seq 1 200); do           # ceiling ~33 min — generous for a full-O3 boot on a 2-CPU runner
            kill -0 "$BOOT_PID" 2>/dev/null || fail "standalone process exited during startup"
            code=$(curl -s -o /dev/null -w '%{http_code}' -u "$AUTH" "$QS/indexingstatus" || true)
            [ "$code" = "200" ] && { READY=1; break; }
            echo "  ...not ready (http $code), elapsed ~$((i*10))s"
            sleep 10
          done
          [ "$READY" = "1" ] || fail "standalone did not become ready in time"
          echo "Server is up."

          # --- trigger the global reindex (retry while the bootstrap daemon token wires up) ---
          echo "Requesting full reindex (scope:all)..."
          ACC=0
          for i in $(seq 1 10); do
            kill -0 "$BOOT_PID" 2>/dev/null || fail "standalone process exited before reindex was accepted"
            code=$(curl -s -o /tmp/reindex.json -w '%{http_code}' -u "$AUTH" \
              -H 'Content-Type: application/json' -X POST -d '{"scope":"all"}' "$QS/reindex" || true)
            echo "  reindex http $code: $(cat /tmp/reindex.json 2>/dev/null)"
            [ "$code" = "202" ] && { ACC=1; break; }
            sleep 15
          done
          [ "$ACC" = "1" ] || fail "reindex request was not accepted"

          # --- poll until indexing reports complete ---
          echo "Waiting for indexing to complete..."
          DONE=0
          for i in $(seq 1 360); do           # ceiling ~30 min — the demo corpus indexes in seconds-to-minutes
            kill -0 "$BOOT_PID" 2>/dev/null || fail "standalone process exited during indexing"
            curl -s -u "$AUTH" "$QS/indexingstatus" > /tmp/status.json || true
            if python3 -c "import json,sys;sys.exit(0 if json.load(open('/tmp/status.json')).get('complete') else 1)" 2>/dev/null; then
              DONE=1; break
            fi
            echo "  ...still indexing (elapsed ~$((i*5))s): $(cat /tmp/status.json 2>/dev/null)"
            sleep 5
          done
          [ "$DONE" = "1" ] || fail "indexing did not complete in time"

          # --- prove the index actually holds documents (not just an empty-but-valid dir) ---
          curl -s -u "$AUTH" "$QS/drift" > /tmp/drift.json || true
          echo "drift: $(cat /tmp/drift.json 2>/dev/null)"
          python3 -c "import json;d=json.load(open('/tmp/drift.json'));tot=sum((x.get('indexedCount') or 0) for x in d.get('types',[]));print('total indexed docs:',tot);assert tot>0" \
            || fail "querystore /drift did not report a non-empty index (unreachable, schema change, or genuinely empty after reindex)"

          LUCENE_DIR=$(find . -type d -path '*/appdata/querystore/lucene' | head -1)
          [ -n "$LUCENE_DIR" ] || fail "appdata/querystore/lucene was not created"
          echo "Baked index at $LUCENE_DIR ($(du -sh "$LUCENE_DIR" | cut -f1))."

          # --- stop the server before copying the index out ---
          # Durability is already guaranteed: the reindex committed each per-type Lucene index
          # before /indexingstatus reported complete, so the on-disk index is final even under a
          # hard kill. We still stop cleanly to release file handles and the DB before the copy.
          echo "Stopping standalone..."
          stop_server
          for i in $(seq 1 30); do kill -0 "$BOOT_PID" 2>/dev/null || break; sleep 2; done
          kill -KILL "$BOOT_PID" 2>/dev/null || true

          # --- copy ONLY the baked index into the pristine (uploaded) artifact ---
          # Count the source files first, then assert the copy landed all of them BEFORE deleting
          # the source. Without -e, an unguarded cp that fails partway (e.g. disk pressure) would
          # otherwise leave a TRUNCATED index that still passes a bare "non-empty" check — a
          # silently-corrupt index shipped to users. Guard the cp and match the file counts.
          SRC_COUNT=$(find "$LUCENE_DIR" -type f | wc -l)
          DEST="$PRISTINE/appdata/querystore/lucene"
          rm -rf "$DEST"
          mkdir -p "$(dirname "$DEST")"
          cp -a "$LUCENE_DIR" "$DEST" || fail "failed to copy baked index into the artifact"
          DEST_COUNT=$(find "$DEST" -type f | wc -l)
          { [ "$SRC_COUNT" -gt 0 ] && [ "$DEST_COUNT" -eq "$SRC_COUNT" ]; } \
            || fail "baked index copy incomplete: $DEST_COUNT/$SRC_COUNT files landed in the artifact"
          # Best-effort throwaway cleanup — MUST NOT fail the build here. The index is already
          # copied into the artifact above; bakerun is not in the upload path and the runner is
          # ephemeral. `rm -rf` can race the standalone's still-finishing shutdown (Tomcat/MariaDB
          # writing into tomcat/ -> "Directory not empty"), which under GitHub Actions' default
          # `bash -e` would otherwise fail the step after a successful bake.
          cd "$GITHUB_WORKSPACE" && rm -rf "$GITHUB_WORKSPACE/bakerun" 2>/dev/null || true

          echo "Bake complete: querystore Lucene index pre-seeded into the uploaded artifact ($DEST_COUNT files, $(du -sh "$DEST" | cut -f1))."

      - name: Upload standalone as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmrs-standalone-chartsearchai
          path: standalone/target/artifact
          # The old upload handed over the .zip as an opaque blob, so every byte
          # (including dotfiles) survived. Re-uploading the extracted tree subjects
          # it to v4's default hidden-file exclusion — keep parity so no runtime
          # config or appdata marker is silently dropped.
          include-hidden-files: true
          retention-days: 90
