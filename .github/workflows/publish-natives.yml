name: Publish llama-server natives

on:
  workflow_dispatch:
    inputs:
      llama_cpp_version:
        description: 'llama.cpp release tag (e.g. b8850)'
        required: true
        default: 'b8850'

env:
  LLAMA_VERSION: ${{ github.event.inputs.llama_cpp_version }}

jobs:
  build-native:
    strategy:
      # Build every platform independently so one failing leg neither cancels the
      # others nor hides their results. The publish job still requires the whole
      # matrix to succeed (it `needs` this job), so a partial failure never ships.
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: Mac
            arch: aarch64
            binary: llama-server
            # Disable native auto-detect and pin a baseline so the binary runs on
            # older M-series chips and on virtualised ARM CPUs (e.g. Docker on Mac
            # doesn't expose every extension the runner's M-series supports).
            cmake_extra: '-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.2-a -DLLAMA_OPENSSL=OFF'
          - os: macos-14
            platform: Mac
            arch: x86_64
            binary: llama-server
            cmake_extra: '-DCMAKE_OSX_ARCHITECTURES=x86_64 -DGGML_NATIVE=OFF -DLLAMA_OPENSSL=OFF'
          - os: ubuntu-22.04
            platform: Linux
            arch: x86_64
            binary: llama-server
            # We ship only the binary (no sibling libs), so don't link OpenSSL - it
            # isn't needed for local inference and libssl.so.3/libcrypto.so.3 would be
            # missing on minimal hosts. (Matches every other leg; see the Windows x64 note.)
            cmake_extra: '-DLLAMA_OPENSSL=OFF'
          - os: ubuntu-22.04-arm
            platform: Linux
            arch: aarch64
            binary: llama-server
            # GitHub's ARM runners are Neoverse-class with SVE/SVE2; Apple Silicon
            # under Docker does not expose those. Disable native auto-detect and
            # pin armv8.2-a so the binary runs on any reasonable aarch64 host.
            cmake_extra: '-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.2-a -DLLAMA_OPENSSL=OFF'
          - os: windows-2022
            platform: Windows
            arch: x86_64
            binary: llama-server.exe
            # Make the x64 exe self-contained so it runs on a clean Windows with no
            # prerequisites (we ship only the .exe, no sibling DLLs):
            #   LLAMA_OPENSSL=OFF          - drop libssl-3-x64.dll / libcrypto-3-x64.dll
            #                                (not in Windows nor the VC++ redist; unused for
            #                                local inference - matches the macOS x86_64 leg)
            #   GGML_OPENMP=OFF            - drop vcomp140.dll (matches the Windows ARM64 leg)
            #   CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded - static CRT, drop msvcp140 /
            #                                vcruntime140 / vcruntime140_1
            # Result: imports only in-box Windows DLLs (kernel32, advapi32, ws2_32,
            # crypt32, and the Win10/11 UCRT api-ms-win-crt-*). Verified with objdump.
            cmake_extra: '-DLLAMA_OPENSSL=OFF -DGGML_OPENMP=OFF -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded'
          - os: windows-2022
            platform: Windows
            arch: aarch64
            binary: llama-server.exe
            # GGML refuses MSVC for ARM ("use clang"), so Windows ARM64 has its own
            # build step below (clang + Ninja + the upstream arm64-windows-llvm
            # toolchain). cmake_extra is unused for this leg.
            cmake_extra: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ env.LLAMA_VERSION }}

      - name: Build llama-server (static)
        if: ${{ !(matrix.platform == 'Windows' && matrix.arch == 'aarch64') }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_STATIC=ON \
            ${{ matrix.cmake_extra }}
          cmake --build build --config Release --target llama-server -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
        shell: bash

      # Windows ARM64 must use clang (GGML rejects MSVC for ARM). Mirror llama.cpp's
      # own windows-cpu/arm64 job: vcvarsall amd64_arm64 supplies the ARM64 Windows
      # SDK headers/libs that clang (targeting arm64-pc-windows-msvc) links against,
      # Ninja drives the upstream clang toolchain file, and GGML_OPENMP=OFF keeps the
      # result a single self-contained .exe (no libomp DLL to bundle alongside it).
      # The upstream arm64-windows-llvm toolchain pins -march=armv8.7-a, which would
      # SIGILL on the bulk of the Windows-on-ARM install base (Surface Pro X and all
      # Snapdragon 8cx devices are ~ARMv8.2; only 2024+ Snapdragon X is >=v8.7). Lower
      # it to the armv8.2-a baseline the other ARM legs deliberately pin for broad
      # compatibility. arch_c_flags is defined once and reused for C and CXX, so a
      # single substitution covers both.
      - name: Pin Windows ARM64 baseline to armv8.2-a
        if: ${{ matrix.platform == 'Windows' && matrix.arch == 'aarch64' }}
        shell: bash
        run: |
          sed -i 's/-march=armv8.7-a/-march=armv8.2-a/' cmake/arm64-windows-llvm.cmake
          grep -q -- '-march=armv8.2-a' cmake/arm64-windows-llvm.cmake \
            || { echo "ERROR: armv8.2-a pin did not apply (upstream toolchain changed?)"; exit 1; }

      - name: Build llama-server (Windows ARM64, clang cross)
        if: ${{ matrix.platform == 'Windows' && matrix.arch == 'aarch64' }}
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64_arm64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/arm64-windows-llvm.cmake ^
            -D CMAKE_BUILD_TYPE=Release ^
            -D BUILD_SHARED_LIBS=OFF ^
            -D GGML_STATIC=ON ^
            -D GGML_OPENMP=OFF ^
            -D GGML_NATIVE=OFF ^
            -D LLAMA_OPENSSL=OFF ^
            -D CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build build --config Release --target llama-server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}---${{ matrix.arch }}
          path: |
            build/bin/${{ matrix.binary }}
            build/bin/Release/${{ matrix.binary }}

  publish:
    needs: build-native
    # Only deploy the natives JAR to the shared OpenMRS Nexus from main. Dispatching
    # this workflow on a feature branch builds every platform (so the binaries — and
    # their sizes — can be inspected from the run artifacts) without republishing.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble natives resources
        run: |
          NATIVES=llama-server-natives/src/main/resources/llama-server
          for dir in artifacts/*/; do
            name="$(basename "$dir")"
            platform="${name%---*}"
            arch="${name##*---}"
            mkdir -p "$NATIVES/$platform/$arch"
            find "$dir" -type f | xargs -I{} cp {} "$NATIVES/$platform/$arch/"
            chmod +x "$NATIVES/$platform/$arch/"* 2>/dev/null || true
          done
          echo "Assembled natives:"
          find "$NATIVES" -type f -exec ls -lh {} \;

      - name: Set up Java and Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: openmrs-repo-snapshots
          server-username: MAVEN_REPO_USERNAME
          server-password: MAVEN_REPO_API_KEY

      - name: Publish natives JAR to OpenMRS Nexus
        run: mvn --batch-mode deploy -DskipTests -f llama-server-natives/pom.xml
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
