name: Publish llama-server natives

on:
  workflow_dispatch:
    inputs:
      llama_cpp_version:
        description: 'llama.cpp release tag (e.g. b8850)'
        required: true
        default: 'b8850'

env:
  LLAMA_VERSION: ${{ github.event.inputs.llama_cpp_version }}

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: Mac
            arch: aarch64
            binary: llama-server
            # Disable native auto-detect and pin a baseline so the binary runs on
            # older M-series chips and on virtualised ARM CPUs (e.g. Docker on Mac
            # doesn't expose every extension the runner's M-series supports).
            cmake_extra: '-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.2-a'
          - os: macos-14
            platform: Mac
            arch: x86_64
            binary: llama-server
            cmake_extra: '-DCMAKE_OSX_ARCHITECTURES=x86_64 -DGGML_NATIVE=OFF -DLLAMA_OPENSSL=OFF'
          # Linux builds use llama.cpp's runtime CPU dispatch — multiple
          # libggml-cpu-* variants are bundled, and the loader picks the
          # best variant for the host CPU at startup. Requires shared libs
          # and dynamic backend loading.
          - os: ubuntu-22.04
            platform: Linux
            arch: x86_64
            binary: llama-server
            cmake_extra: '-DBUILD_SHARED_LIBS=ON -DGGML_STATIC=OFF -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON'
          - os: ubuntu-22.04-arm
            platform: Linux
            arch: aarch64
            binary: llama-server
            cmake_extra: '-DBUILD_SHARED_LIBS=ON -DGGML_STATIC=OFF -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON'
          - os: windows-2022
            platform: Windows
            arch: x86_64
            binary: llama-server.exe
            cmake_extra: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ env.LLAMA_VERSION }}

      - name: Build llama-server
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_STATIC=ON \
            ${{ matrix.cmake_extra }}
          cmake --build build --config Release --target llama-server -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
        shell: bash

      - name: Upload binary and shared libraries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}---${{ matrix.arch }}
          path: |
            build/bin/${{ matrix.binary }}
            build/bin/Release/${{ matrix.binary }}
            build/bin/*.so*
            build/bin/*.dylib
            build/bin/Release/*.dll

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble natives resources
        run: |
          NATIVES=llama-server-natives/src/main/resources/llama-server
          for dir in artifacts/*/; do
            name="$(basename "$dir")"
            platform="${name%---*}"
            arch="${name##*---}"
            target="$NATIVES/$platform/$arch"
            mkdir -p "$target"
            find "$dir" -type f | xargs -I{} cp {} "$target/"
            chmod +x "$target"/* 2>/dev/null || true
            # libs.txt lists shared libraries that LocalLlmEngine extracts and
            # places alongside llama-server with LD_LIBRARY_PATH/DYLD_LIBRARY_PATH
            # set. The binary itself is excluded — only loadable libraries.
            (cd "$target" && \
              find . -maxdepth 1 -type f \( -name '*.so' -o -name '*.so.*' \
                -o -name '*.dylib' -o -name '*.dll' \) -printf '%f\n' \
                | sort > libs.txt)
          done
          echo "Assembled natives:"
          find "$NATIVES" -type f -exec ls -lh {} \;
          echo "libs.txt contents:"
          find "$NATIVES" -name libs.txt -exec sh -c 'echo "=== $1 ==="; cat "$1"' _ {} \;

      - name: Set up Java and Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: openmrs-repo-snapshots
          server-username: MAVEN_REPO_USERNAME
          server-password: MAVEN_REPO_API_KEY

      - name: Publish natives JAR to OpenMRS Nexus
        run: mvn --batch-mode deploy -DskipTests -f llama-server-natives/pom.xml
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
