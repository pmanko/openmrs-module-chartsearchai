name: Publish llama-server natives

on:
  workflow_dispatch:
    inputs:
      llama_cpp_version:
        description: 'llama.cpp release tag (e.g. b8850)'
        required: true
        default: 'b8850'

env:
  LLAMA_VERSION: ${{ github.event.inputs.llama_cpp_version }}

jobs:
  build-native:
    strategy:
      # Build every platform independently so one failing leg neither cancels the
      # others nor hides their results. The publish job still requires the whole
      # matrix to succeed (it `needs` this job), so a partial failure never ships.
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: Mac
            arch: aarch64
            binary: llama-server
            # Disable native auto-detect and pin a baseline so the binary runs on
            # older M-series chips and on virtualised ARM CPUs (e.g. Docker on Mac
            # doesn't expose every extension the runner's M-series supports).
            cmake_extra: '-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.2-a -DLLAMA_OPENSSL=OFF'
          - os: macos-14
            platform: Mac
            arch: x86_64
            binary: llama-server
            cmake_extra: '-DCMAKE_OSX_ARCHITECTURES=x86_64 -DGGML_NATIVE=OFF -DLLAMA_OPENSSL=OFF'
          - os: ubuntu-22.04
            platform: Linux
            arch: x86_64
            binary: llama-server
            # We ship only the binary (no sibling libs), so don't link OpenSSL - it
            # isn't needed for local inference and libssl.so.3/libcrypto.so.3 would be
            # missing on minimal hosts. (Matches every other leg; see the Windows x64 note.)
            # Pin a portable x86-64 ISA baseline instead of GGML_NATIVE's default (-march=native),
            # which tunes the binary to THIS Intel runner's CPU (incl. AVX-512). That published
            # binary then risks SIGILL on hosts lacking those extensions - e.g. the AMD EPYC Milan
            # demo box is AVX2-only (no AVX-512). AVX2+FMA+F16C (~x86-64-v3 sans AVX-512) is the
            # practical floor for any host that can run a local LLM and is what the demo already
            # uses, so this is portability/safety, not a perf change. Mirrors the ARM legs pinning
            # armv8.2-a. (For peak-per-host later: GGML_BACKEND_DL + GGML_CPU_ALL_VARIANTS, but that
            # ships multiple .so variants and breaks the single-self-contained-binary assumption.)
            cmake_extra: '-DLLAMA_OPENSSL=OFF -DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON'
          - os: ubuntu-22.04-arm
            platform: Linux
            arch: aarch64
            binary: llama-server
            # GitHub's ARM runners are Neoverse-class with SVE/SVE2; Apple Silicon
            # under Docker does not expose those. Disable native auto-detect and
            # pin armv8.2-a so the binary runs on any reasonable aarch64 host.
            cmake_extra: '-DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8.2-a -DLLAMA_OPENSSL=OFF'
          - os: windows-2022   # NOTE: the clean-Windows smoke step below pins a
                                 # container tag (ltsc2022) to THIS host for process
                                 # isolation - bump both together if this runner changes.
            platform: Windows
            arch: x86_64
            binary: llama-server.exe
            # Make the x64 exe self-contained so it runs on a clean Windows with no
            # prerequisites (we ship only the .exe, no sibling DLLs):
            #   LLAMA_OPENSSL=OFF          - drop libssl-3-x64.dll / libcrypto-3-x64.dll
            #                                (not in Windows nor the VC++ redist; unused for
            #                                local inference - matches the macOS x86_64 leg)
            #   GGML_OPENMP=OFF            - drop vcomp140.dll (matches the Windows ARM64 leg)
            #   CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded - static CRT, drop msvcp140 /
            #                                vcruntime140 / vcruntime140_1
            #   GGML_NATIVE=OFF + AVX/AVX2/FMA/F16C - pin a portable x86-64 baseline instead of
            #                                -march=native, which would tune the .exe to this Intel
            #                                runner (incl. AVX-512) and risk SIGILL on AVX2-only or
            #                                AMD hosts. Same baseline as the Linux x86_64 leg.
            # Result: imports only in-box Windows DLLs (kernel32, advapi32, ws2_32,
            # crypt32, and the Win10/11 UCRT api-ms-win-crt-*). Verified with objdump.
            cmake_extra: '-DLLAMA_OPENSSL=OFF -DGGML_OPENMP=OFF -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON'
          - os: windows-2022
            platform: Windows
            arch: aarch64
            binary: llama-server.exe
            # GGML refuses MSVC for ARM ("use clang"), so Windows ARM64 has its own
            # build step below (clang + Ninja + the upstream arm64-windows-llvm
            # toolchain). cmake_extra is unused for this leg.
            cmake_extra: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ env.LLAMA_VERSION }}

      - name: Build llama-server (static)
        if: ${{ !(matrix.platform == 'Windows' && matrix.arch == 'aarch64') }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_STATIC=ON \
            ${{ matrix.cmake_extra }}
          cmake --build build --config Release --target llama-server -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
        shell: bash

      # Windows ARM64 must use clang (GGML rejects MSVC for ARM). Mirror llama.cpp's
      # own windows-cpu/arm64 job: vcvarsall amd64_arm64 supplies the ARM64 Windows
      # SDK headers/libs that clang (targeting arm64-pc-windows-msvc) links against,
      # Ninja drives the upstream clang toolchain file, and GGML_OPENMP=OFF keeps the
      # result a single self-contained .exe (no libomp DLL to bundle alongside it).
      # The upstream arm64-windows-llvm toolchain pins -march=armv8.7-a, which would
      # SIGILL on the bulk of the Windows-on-ARM install base (Surface Pro X and all
      # Snapdragon 8cx devices are ~ARMv8.2; only 2024+ Snapdragon X is >=v8.7). Lower
      # it to the armv8.2-a baseline the other ARM legs deliberately pin for broad
      # compatibility. arch_c_flags is defined once and reused for C and CXX, so a
      # single substitution covers both.
      - name: Pin Windows ARM64 baseline to armv8.2-a
        if: ${{ matrix.platform == 'Windows' && matrix.arch == 'aarch64' }}
        shell: bash
        run: |
          sed -i 's/-march=armv8.7-a/-march=armv8.2-a/' cmake/arm64-windows-llvm.cmake
          grep -q -- '-march=armv8.2-a' cmake/arm64-windows-llvm.cmake \
            || { echo "ERROR: armv8.2-a pin did not apply (upstream toolchain changed?)"; exit 1; }

      - name: Build llama-server (Windows ARM64, clang cross)
        if: ${{ matrix.platform == 'Windows' && matrix.arch == 'aarch64' }}
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64_arm64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/arm64-windows-llvm.cmake ^
            -D CMAKE_BUILD_TYPE=Release ^
            -D BUILD_SHARED_LIBS=OFF ^
            -D GGML_STATIC=ON ^
            -D GGML_OPENMP=OFF ^
            -D GGML_NATIVE=OFF ^
            -D LLAMA_OPENSSL=OFF ^
            -D CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build build --config Release --target llama-server

      # Guard against silent regression: we ship only the binary (no sibling libs), so it
      # must not dynamically link OpenSSL, the MSVC runtime, or OpenMP - those are absent
      # on a clean host and crash at startup (this is exactly the bug that broke the
      # Windows/macOS downloads). Those library names appear in the import table only when
      # actually linked, and never in help/version text, so a portable byte grep over the
      # binary is a reliable cross-OS denylist (no objdump/otool/dumpbin needed). Verified
      # to match the pre-fix binaries and pass the self-contained ones.
      - name: Verify the binary is self-contained
        shell: bash
        run: |
          # Find the binary without tripping `set -e -o pipefail`: `ls a b` where one path is
          # absent returns non-zero, which pipefail+errexit would turn into a step abort.
          BIN=""
          for c in "build/bin/${{ matrix.binary }}" "build/bin/Release/${{ matrix.binary }}"; do
            if [ -f "$c" ]; then BIN="$c"; break; fi
          done
          [ -n "$BIN" ] || { echo "ERROR: built binary not found"; exit 1; }
          # Export the resolved path so the Windows smoke step below reuses it verbatim
          # rather than re-deriving it (single source of truth; no candidate-order drift).
          echo "VERIFIED_BIN=$BIN" >> "$GITHUB_ENV"
          # These names only appear in the binary as DYNAMIC imports given our flags (OpenSSL
          # off -> no libssl/libcrypto strings; static CRT -> no msvcp140/vcruntime140; vcomp140
          # is DLL-only, never static). Do NOT add libgomp/libomp: GGML statically links OpenMP
          # on Linux, so those appear as static-link strings with no runtime dep and would
          # false-fail the self-contained Linux binary. vcomp140 already covers Windows OpenMP.
          MATCHES=$(LC_ALL=C grep -a -o -i -E "libssl|libcrypto|msvcp140|vcruntime140|vcomp140" "$BIN" | sort -u || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: $BIN links non-bundled runtime dependencies:"
            echo "$MATCHES"
            echo "Add the missing cmake flag to this leg (LLAMA_OPENSSL=OFF / GGML_OPENMP=OFF / CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded)."
            exit 1
          fi
          echo "OK: $BIN is self-contained (no OpenSSL / MSVC-runtime / OpenMP)."

      # Runtime proof of the same claim the static check above makes from the import
      # table: execute the binary on a GENUINELY clean Windows that ships no VC++
      # redistributable. A Windows Server Core container has no msvcp140/vcruntime140,
      # so `llama-server.exe --version` returning 0 (rather than 0xC0000135 /
      # -1073741515 STATUS_DLL_NOT_FOUND) proves the .exe resolves only in-box DLLs.
      # x86_64 only: this is an x64 runner, so it can neither execute an arm64 .exe
      # nor host an arm64 container; the Windows arm64 leg relies on the static check.
      # ltsc2022 matches the windows-2022 host so the container uses fast process
      # isolation. Costs one Server Core image pull (~minutes) on this leg per run.
      - name: Smoke-test launch on clean Windows Server Core
        if: ${{ matrix.platform == 'Windows' && matrix.arch == 'x86_64' }}
        shell: pwsh
        run: |
          # Native command non-zero exits must flow to $LASTEXITCODE (for the daemon
          # readiness poll and the launch check below), not throw — the GitHub pwsh
          # prologue sets ErrorActionPreference=stop, and pwsh 7.4+ would otherwise
          # turn a native non-zero exit into a terminating error.
          $PSNativeCommandUseErrorActionPreference = $false

          # Classify failures so a red leg is triageable from the run UI (not just the
          # step log): an infra hiccup is "re-run", a binary failure is "do not ship".
          # The ::error:: annotations surface the distinction on the run summary page.
          function Fail-Infra ($m)  { Write-Host "::error title=Clean-Windows smoke - infra (not a binary failure)::$m"; throw $m }
          function Fail-Binary($m)  { Write-Host "::error title=Clean-Windows smoke - binary failed to launch::$m";    throw $m }

          # Reuse the exact binary the static check above resolved (single source of truth).
          $bin = $env:VERIFIED_BIN
          if (-not $bin -or -not (Test-Path $bin)) { Fail-Infra "VERIFIED_BIN ('$bin') is unset or missing; the Verify step should have exported it." }
          $dir  = (Get-Item $bin).Directory.FullName
          $name = Split-Path $bin -Leaf
          $img  = "mcr.microsoft.com/windows/servercore:ltsc2022"

          # GitHub's Windows runners ship Docker (Moby) but don't reliably leave the
          # daemon running, so the engine pipe may be absent at first use. Start the
          # service and wait up to 120s (40 x 3s, breaks on first success) for readiness.
          Start-Service docker -ErrorAction SilentlyContinue
          $ready = $false
          foreach ($i in 1..40) {
            docker info *> $null
            if ($LASTEXITCODE -eq 0) { $ready = $true; break }
            Start-Sleep -Seconds 3
          }
          if (-not $ready) { Fail-Infra "Docker daemon did not become ready on this runner." }

          # Pull the image as a distinct, infra-classed step so a registry/network
          # failure can't later be misread as a binary launch failure.
          docker pull $img
          if ($LASTEXITCODE -ne 0) { Fail-Infra "failed to pull $img." }

          # The test only proves "self-contained" if the base image is genuinely clean,
          # so ASSERT the VC++ runtime is absent — don't just log it. A future image that
          # bundled it would otherwise let this gate pass without proving anything.
          $vc = "$(docker run --rm $img cmd /c "if exist C:\Windows\System32\vcruntime140.dll (echo PRESENT) else (echo ABSENT)")".Trim()
          Write-Host "vcruntime140 in base image: $vc"
          if ($vc -ne "ABSENT") { Fail-Infra "base image $img vcruntime140 check returned '$vc' (expected ABSENT); the clean-box claim no longer holds." }

          # The actual proof: the binary loads (all imports resolve to in-box DLLs) and runs.
          $out = (docker run --rm -v "${dir}:C:\app" $img "C:\app\$name" --version 2>&1 | Out-String)
          $code = $LASTEXITCODE
          Write-Host "exit code: $code"
          Write-Host $out
          # 125 = docker/CLI could not start the container (mount/daemon/image) — infra.
          if ($code -eq 125) { Fail-Infra "docker could not start the container (exit 125)." }
          # Any other non-zero (e.g. 0xC0000135 / -1073741515 STATUS_DLL_NOT_FOUND) means
          # the .exe failed to load; exit 0 with no output means it never actually ran.
          if ($code -ne 0)        { Fail-Binary "$name failed to launch on clean Windows Server Core (exit $code; 0xC0000135 / -1073741515 = missing DLL)." }
          if (-not $out.Trim())   { Fail-Binary "$name exited 0 but produced no --version output on clean Windows Server Core." }
          Write-Host "OK: $name launches and runs on clean Windows Server Core (no VC++ redist)."
          # The GitHub pwsh wrapper ends with `exit $LASTEXITCODE`; make success explicit
          # and immune to any lingering native exit code.
          exit 0

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}---${{ matrix.arch }}
          path: |
            build/bin/${{ matrix.binary }}
            build/bin/Release/${{ matrix.binary }}

  publish:
    needs: build-native
    # Only deploy the natives JAR to the shared OpenMRS Nexus from main. Dispatching
    # this workflow on a feature branch builds every platform (so the binaries — and
    # their sizes — can be inspected from the run artifacts) without republishing.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble natives resources
        run: |
          NATIVES=llama-server-natives/src/main/resources/llama-server
          for dir in artifacts/*/; do
            name="$(basename "$dir")"
            platform="${name%---*}"
            arch="${name##*---}"
            mkdir -p "$NATIVES/$platform/$arch"
            find "$dir" -type f | xargs -I{} cp {} "$NATIVES/$platform/$arch/"
            chmod +x "$NATIVES/$platform/$arch/"* 2>/dev/null || true
          done
          echo "Assembled natives:"
          find "$NATIVES" -type f -exec ls -lh {} \;

      - name: Set up Java and Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: openmrs-repo-snapshots
          server-username: MAVEN_REPO_USERNAME
          server-password: MAVEN_REPO_API_KEY

      - name: Publish natives JAR to OpenMRS Nexus
        run: mvn --batch-mode deploy -DskipTests -f llama-server-natives/pom.xml
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
